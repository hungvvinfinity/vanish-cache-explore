server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location = /healthz {
        access_log off;
        add_header Cache-Control "no-store" always;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        add_header Cache-Control "public, max-age=60" always;
        try_files /index.html =404;
    }

    location = /cacheable {
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=30" always;
        add_header X-Origin-Time $time_iso8601 always;
        default_type text/plain;
        return 200 "cacheable response from nginx origin\n";
    }

    location = /private {
        add_header Cache-Control "private, no-store" always;
        add_header Set-Cookie "session=demo; Path=/; HttpOnly; SameSite=Lax" always;
        add_header X-Origin-Time $time_iso8601 always;
        default_type text/plain;
        return 200 "private response from nginx origin\n";
    }

    location /payload/ {
        alias /tmp/payload/;
        add_header Cache-Control "public, max-age=3600, immutable" always;
        add_header X-Origin-Time $time_iso8601 always;
        default_type application/octet-stream;
        try_files $uri =404;
    }
}
