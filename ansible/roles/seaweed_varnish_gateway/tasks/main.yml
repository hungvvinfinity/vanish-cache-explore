---
- name: Validate gateway inputs
  ansible.builtin.assert:
    that:
      - ansible_distribution == 'Ubuntu'
      - ansible_distribution_version is version('24.04', '>=')
      - ansible_distribution_version is version('25.0', '<')
      - ansible_architecture == 'x86_64'
      - gateway_seaweedfs_arch == 'amd64'
      - gateway_public_hostname is match('^[A-Za-z0-9.-]+$')
      - gateway_tls_certificate_path is match('^/[^[:space:]]+$')
      - gateway_tls_private_key_path is match('^/[^[:space:]]+$')
      - gateway_seaweedfs_release_sha256 is match('^[a-fA-F0-9]{64}$')
      - gateway_s3_bucket is match('^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$')
      - gateway_seed_object_count | int >= 2
      - gateway_seed_object_size | int > 0
    fail_msg: >-
      This role requires an x86_64 Ubuntu 24.04 host, valid TLS paths, a
      SHA-256 for the pinned SeaweedFS artifact, and valid demo settings.

- name: Check the existing TLS certificate and key
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ gateway_tls_certificate_path }}"
    - "{{ gateway_tls_private_key_path }}"
  register: gateway_tls_files

- name: Require existing TLS certificate and key files
  ansible.builtin.assert:
    that: item.stat.exists and item.stat.isreg
    fail_msg: "Required TLS file does not exist or is not a regular file: {{ item.item }}"
  loop: "{{ gateway_tls_files.results }}"

- name: Install native gateway packages
  ansible.builtin.apt:
    name: "{{ gateway_required_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create SeaweedFS service account
  ansible.builtin.user:
    name: seaweedfs
    system: true
    shell: /usr/sbin/nologin
    home: "{{ gateway_seaweedfs_data_dir }}"
    create_home: false

- name: Create gateway state directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ gateway_seaweedfs_data_dir }}", owner: seaweedfs, group: seaweedfs, mode: '0750' }
    - { path: "{{ gateway_runtime_dir }}", owner: seaweedfs, group: seaweedfs, mode: '0750' }
    - { path: "{{ gateway_varnish_cache_dir }}", owner: varnish, group: varnish, mode: '0750' }
    - { path: /usr/local/libexec/seaweed-varnish-gateway, owner: root, group: root, mode: '0755' }

- name: Download pinned SeaweedFS release archive
  ansible.builtin.get_url:
    url: "{{ gateway_seaweedfs_download_url }}"
    dest: "/tmp/seaweedfs-{{ gateway_seaweedfs_version }}-{{ gateway_seaweedfs_arch }}.tar.gz"
    checksum: "sha256:{{ gateway_seaweedfs_release_sha256 }}"
    mode: '0644'

- name: Install SeaweedFS binary
  ansible.builtin.unarchive:
    src: "/tmp/seaweedfs-{{ gateway_seaweedfs_version }}-{{ gateway_seaweedfs_arch }}.tar.gz"
    dest: /usr/local/bin
    include:
      - weed
    remote_src: true
    mode: '0755'
  notify: Restart seaweedfs

- name: Install SeaweedFS systemd unit
  ansible.builtin.template:
    src: seaweedfs.service.j2
    dest: /etc/systemd/system/seaweedfs.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd daemon
    - Restart seaweedfs

- name: Install Varnish systemd unit
  ansible.builtin.template:
    src: varnish.service.j2
    dest: /etc/systemd/system/varnish.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd daemon
    - Restart varnish

- name: Install Varnish cache policy
  ansible.builtin.template:
    src: default.vcl.j2
    dest: /etc/varnish/default.vcl
    owner: root
    group: root
    mode: '0644'
  notify: Restart varnish

- name: Install Varnish cache preallocation helper
  ansible.builtin.template:
    src: preallocate-cache.sh.j2
    dest: /usr/local/libexec/seaweed-varnish-gateway/preallocate-cache.sh
    owner: root
    group: root
    mode: '0755'
  notify: Restart varnish

- name: Install one-shot demo seed service
  ansible.builtin.template:
    src: seed-objects.service.j2
    dest: /etc/systemd/system/seaweedfs-seed.service
    owner: root
    group: root
    mode: '0644'
  register: gateway_seed_unit
  notify: Reload systemd daemon

- name: Install demo object seeder
  ansible.builtin.template:
    src: seed_objects.py.j2
    dest: /usr/local/libexec/seaweed-varnish-gateway/seed_objects.py
    owner: seaweedfs
    group: seaweedfs
    mode: '0750'
  register: gateway_seed_script

- name: Install Nginx HTTPS gateway site
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/seaweed-varnish-gateway.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart nginx

- name: Enable gateway Nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/seaweed-varnish-gateway.conf
    dest: /etc/nginx/sites-enabled/seaweed-varnish-gateway.conf
    state: link
  notify: Restart nginx

- name: Disable Nginx default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Validate Varnish configuration
  ansible.builtin.command:
    argv: [/usr/sbin/varnishd, -C, -f, /etc/varnish/default.vcl]
  changed_when: false

- name: Validate Nginx configuration
  ansible.builtin.command:
    argv: [/usr/sbin/nginx, -t]
  changed_when: false

- name: Apply configuration changes before service health checks
  ansible.builtin.meta: flush_handlers

- name: Enable and start SeaweedFS
  ansible.builtin.systemd_service:
    name: seaweedfs
    enabled: true
    state: started

- name: Wait for SeaweedFS S3 listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ gateway_seaweedfs_s3_port }}"
    timeout: 60

- name: Enable and start Varnish
  ansible.builtin.systemd_service:
    name: varnish
    enabled: true
    state: started

- name: Enable and start Nginx
  ansible.builtin.systemd_service:
    name: nginx
    enabled: true
    state: started

- name: Re-run demo object seeder after seed configuration changes
  ansible.builtin.systemd_service:
    name: seaweedfs-seed
    enabled: false
    state: restarted
  when: gateway_seed_unit.changed

- name: Ensure demo object seeder has run for its configured parameters
  ansible.builtin.systemd_service:
    name: seaweedfs-seed
    enabled: false
    state: started
  when: not gateway_seed_unit.changed
