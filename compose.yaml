services:
  origin:
    image: ${NGINX_IMAGE:-nginx:1.30.3-alpine}
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /tmp/payload
        dd if=/dev/zero of=/tmp/payload/1m.bin bs=1048576 count=1 2>/dev/null
        exec nginx -g 'daemon off;'
    ports:
      - "${ORIGIN_PORT:-8081}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  varnish:
    image: ${VARNISH_IMAGE:-varnish:9.0}
    environment:
      VARNISH_SIZE: ${VARNISH_SIZE:-128M}
    command:
      - -F
      - -f
      - /etc/varnish/default.vcl
      - -p
      - feature=+http2
      - -p
      - workspace_backend=1M
      - -p
      - http_resp_hdr_len=65536
      - -p
      - http_resp_size=98304
    depends_on:
      origin:
        condition: service_healthy
    ports:
      - "${VARNISH_PORT:-8080}:80"
    tmpfs:
      - /var/lib/varnish:exec,uid=1000,gid=1000,mode=0755
    ulimits:
      memlock: -1
    volumes:
      - ./varnish/default.vcl:/etc/varnish/default.vcl:ro
    healthcheck:
      test: ["CMD", "varnishstat", "-1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
